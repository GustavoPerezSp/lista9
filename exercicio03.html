<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 03</title>
</head>
<body>
    <button onclick="sortear()">Jogar dado</button>
    <div id="dMsg"></div>

    

    
</body>
</html>

<script>
    function sortear(){
        let sorteado = Math.random();
        let min = 1;
        let max = 20;
        let intervalo = max - min
        sorteado *= intervalo
        sorteado += min

        sorteado = sorteado.toFixed(0);

        dMsg.innerHTML = `<div style="display:flex;justify-content:center;align-items:center;width: 150px;height: 150px;background-color: black;color: white;">${sorteado}</div>`

    }
</script>
